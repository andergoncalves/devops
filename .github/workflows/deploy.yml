name: Build e Deploy Node via SSH

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Instalar dependências
        run: npm install

      # Se seu projeto tiver build (TypeScript, etc)
      - name: 🏗️ Build do projeto
        run: |
          if [ -f package.json ] && grep -q "\"build\"" package.json; then
            npm run build
          fi

      - name: 📦 Preparar arquivos
        run: |
          mkdir deploy
          cp -r * deploy/
          rm -rf deploy/node_modules
          rm -rf deploy/.git

      - name: 🔐 Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Enviar arquivos (rsync)
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            deploy/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app/

      - name: ♻️ Reiniciar aplicação no servidor
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/app

            echo "📦 Instalando apenas produção..."
            npm install --production

            echo "♻️ Reiniciando aplicação..."
            pm2 reload minha-api || pm2 start app.js --name minha-api

            pm2 save
          EOF