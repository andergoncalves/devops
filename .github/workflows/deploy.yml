name: Build e Deploy Node via SSH

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🏗️ Build do projeto (se existir)
        run: |
          if grep -q "\"build\"" package.json; then
            npm run build
          fi

      - name: 🔐 Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf "Host *\n  IdentityFile ~/.ssh/id_rsa\n  StrictHostKeyChecking no\n" > ~/.ssh/config

      - name: 🔍 Verificar arquivos
        run: |
          echo "LISTANDO ARQUIVOS:"
          ls -la
          echo "SRC:"
          ls -la src || echo "SEM SRC"

      # 🔥 NOVA ETAPA (SUBSTITUI RSYNC)
      - name: 📦 Compactar arquivos
        run: |
          tar --warning=no-file-changed \
              --exclude='./node_modules' \
              --exclude='./.git' \
              --exclude='./.github' \
              --exclude='./.env' \
              -czf /tmp/deploy.tar.gz .

      - name: 🧪 Testar conexão SSH
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo OK"

      - name: 🚀 Enviar via SCP
        run: |
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} /tmp/deploy.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app/

      - name: 🔐 Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          printf "Host *\n  IdentityFile ~/.ssh/id_rsa\n  StrictHostKeyChecking no\n" > ~/.ssh/config

      - name: 📂 Extrair e atualizar no servidor
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/app

            echo "🧹 Limpando arquivos antigos (preservando .env)..."
            find . -mindepth 1 ! -name '.env' -exec rm -rf {} +

            echo "📦 Extraindo novo deploy..."
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "📦 Instalando produção..."
            npm install --production

            echo "♻️ Reiniciando aplicação..."
            pm2 reload minha-api || pm2 start app.js --name minha-api

            pm2 save
          EOF