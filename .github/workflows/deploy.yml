name: Deploy Docker ECR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔑 Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build da imagem com Buildx
        run: |
          IMAGE_NAME=${{ secrets.CONTAINER_NAME }}
          docker buildx create --use || true  # Cria builder se não existir
          docker buildx build -t $IMAGE_NAME . --load

      - name: 🏷️ Tag da imagem
        run: |
          IMAGE_NAME=${{ secrets.CONTAINER_NAME }}
          docker tag $IMAGE_NAME:latest ${{ secrets.ECR_REPOSITORY }}:latest

      - name: 🚀 Push para ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:latest

      - name: 🔐 SSH no servidor
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 🚀 Atualizar container no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            CONTAINER_NAME=${{ secrets.CONTAINER_NAME }}
            ECR_URI=${{ secrets.ECR_REPOSITORY }}
            PORT=${{ secrets.CONTAINER_PORT }}

            echo "🔑 Login no ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin 197034345540.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            echo "📥 Pull da nova imagem..."
            docker pull $ECR_URI:latest

            # Backup dos logs antigos
            if [ $(docker ps -a -q -f name=$CONTAINER_NAME) ]; then
              echo "💾 Backup logs do container existente..."
              docker logs $CONTAINER_NAME > "/tmp/${CONTAINER_NAME}_logs_$(date +%Y%m%d%H%M%S).log" || true
            fi

            echo "🛑 Parando container antigo..."
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            echo "🚀 Subindo novo container..."
            docker run -d \
              -p ${PORT}:${PORT} \
              --name $CONTAINER_NAME \
              --restart always \
              $ECR_URI:latest
EOF