name: Deploy Docker ECR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ЁЯУе Checkout
        uses: actions/checkout@v4

      - name: ЁЯФР Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: ЁЯФС Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: ЁЯР│ Build da imagem com Buildx
        run: |
          IMAGE_NAME=${{ secrets.CONTAINER_NAME }}
          docker buildx create --use || true
          docker buildx build --no-cache -t $IMAGE_NAME . --load

      - name: ЁЯП╖я╕П Tag da imagem
        run: |
          IMAGE_NAME=${{ secrets.CONTAINER_NAME }}
          docker tag $IMAGE_NAME:latest ${{ secrets.ECR_REPOSITORY }}:latest

      - name: ЁЯЪА Push para ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:latest

      - name: ЁЯФР SSH no servidor
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: ЁЯЪА Atualizar container no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            CONTAINER_NAME=${{ secrets.CONTAINER_NAME }}
            ECR_URI=${{ secrets.ECR_REPOSITORY }}
            PORT=${{ secrets.CONTAINER_PORT }}

            echo "ЁЯФС Login no ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin $ECR_URI

            echo "ЁЯУе Pull da nova imagem..."
            docker pull $ECR_URI:latest

            # Backup dos logs antigos
            if [ $(docker ps -a -q -f name=$CONTAINER_NAME) ]; then
              echo "ЁЯТ╛ Backup logs do container existente...."
              docker logs $CONTAINER_NAME > "/tmp/${CONTAINER_NAME}_logs_$(date +%Y%m%d%H%M%S).log" || true
            fi

            echo "ЁЯЫС Parando e removendo container antigo..."
            docker ps -q --filter "name=$CONTAINER_NAME" | xargs -r docker stop
            docker ps -aq --filter "name=$CONTAINER_NAME" | xargs -r docker rm

            docker ps -q --filter "publish=${PORT}" | xargs -r docker stop
            docker ps -aq --filter "publish=${PORT}" | xargs -r docker rm

            echo "ЁЯз╣ Removendo containers e imagens dangling..."
            docker system prune -f

            echo "ЁЯЪА Subindo novo container..."
            docker run -d \
              -p ${PORT}:${PORT} \
              --name $CONTAINER_NAME \
              --restart always \
              $ECR_URI:latest

            echo "тЬЕ Deploy finalizado com sucesso!"
          EOF