name: Deploy Docker ECR2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔑 Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build e tag da imagem
        run: |
          docker buildx create --use || true
          docker buildx build --no-cache -t ${{ secrets.ECR_REPOSITORY }}:latest . --load

      - name: 🚀 Push para ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:latest

      - name: 🔐 SSH no servidor
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 🚀 Atualizar container no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            set -e

            CONTAINER_NAME=${{ secrets.CONTAINER_NAME }}
            PORT=${{ secrets.CONTAINER_PORT }}
            # URI completo do ECR
            ECR_URI=${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}

            echo "🔑 Login no ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin $ECR_URI

            echo "📥 Pull da nova imagem..."
            docker pull $ECR_URI:latest

            # Só para/remover container se existir
            CONTAINER_ID=\$(docker ps -aq -f name=\$CONTAINER_NAME)
            if [ -n "\$CONTAINER_ID" ]; then
              echo "💾 Backup logs..."
              docker logs \$CONTAINER_NAME > "/tmp/\${CONTAINER_NAME}_logs_\$(date +%Y%m%d%H%M%S).log" || true

              echo "🛑 Parando e removendo container antigo..."
              docker stop \$CONTAINER_NAME || true
              docker rm \$CONTAINER_NAME || true
            fi

            echo "🚀 Subindo novo container..."
            docker run -d \
              -p \${PORT}:\${PORT} \
              --name \$CONTAINER_NAME \
              --restart always \
              \$ECR_URI:latest

            echo "✅ Deploy finalizado!"
EOF